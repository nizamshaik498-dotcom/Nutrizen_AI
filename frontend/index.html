<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <meta name="description" content="AI-powered smart kitchen assistant. Scan vegetables, get recipes, nutrition, allergy info, and smart substitutions." />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#84CC16" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NutriZen" />
    <meta property="og:title" content="NutriZen AI" />
    <meta property="og:description" content="AI-powered smart kitchen assistant — scan vegetables, get recipes, nutrition, allergy info, and smart substitutions." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nutrizen-ai.vercel.app" />
    <title>NutriZen AI</title>
  </head>
  <body class="font-sans antialiased">
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').then(reg => {
          reg.addEventListener('updatefound', () => {
            const newSW = reg.installing
            newSW.addEventListener('statechange', () => {
              if (newSW.state === 'installed' && navigator.serviceWorker.controller) window.location.reload()
            })
          })
          if (reg.active) reg.update()
        }).catch(() => {})
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
